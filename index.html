<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Woody</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Cinzel+Decorative:wght@700&family=Outfit:wght@800&family=Playfair+Display:wght@900&family=Plus+Jakarta+Sans:wght@700;800;900&family=Space+Grotesk:wght@700&display=swap');

    :root {
      --bg: #07090e;
      --glass-bg: rgba(20, 24, 33, 0.75);
      --glass-card: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-glow: rgba(234, 179, 8, 0.25);
      --yellow: #eab308;
      --yellow-hover: #ca8a04;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --green: #22c55e;
      --card-radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif; -webkit-tap-highlight-color: transparent; }
    
    body { 
      background: radial-gradient(circle at top left, #1a1500 0%, #07090e 50%, #050608 100%);
      background-attachment: fixed;
      color: var(--text); 
      min-height: 100vh; 
      padding: 16px;
      overflow-x: hidden;
    }

    /* Loki-Style Decelerating Intro Screen */
    #splashScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #07090e;
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: opacity 0.6s ease, visibility 0.6s;
    }
    .loki-container {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .loki-char {
      font-size: 3.8rem;
      font-weight: 900;
      color: #ffffff;
      display: inline-block;
      margin: 0 2px;
      transition: font-family 0.1s ease;
    }
    .loki-char.dot { color: var(--yellow); }

    /* Header Structure */
    header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 20px;
      padding: 12px 16px;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: var(--card-radius);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      position: relative;
    }
    .brand { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.5px; color: var(--text); flex: 1; text-align: center; margin-left: 42px; }
    .brand span { color: var(--yellow); }

    .nav-search-btn {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--yellow);
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: transform 0.2s ease, background 0.2s ease;
      padding: 0;
    }
    .nav-search-btn:active { transform: scale(0.9); background: rgba(234, 179, 8, 0.15); }
    .nav-search-btn svg { width: 20px; height: 20px; stroke: var(--yellow); stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }

    /* Glass Search Bar */
    .search-box { 
      margin-bottom: 20px; 
      display: flex;
      gap: 10px;
      align-items: center;
    }
    input { 
      flex: 1; 
      padding: 16px 20px; 
      border-radius: var(--card-radius); 
      border: 1px solid var(--glass-border); 
      background: var(--glass-bg); 
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      color: #fff; 
      font-size: 0.95rem; 
      outline: none; 
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }
    input:focus { 
      border-color: var(--yellow); 
      box-shadow: 0 0 20px var(--glass-glow);
    }
    .btn-search {
      padding: 16px 22px;
      border-radius: var(--card-radius);
      border: none;
      background: var(--yellow);
      color: #000;
      font-weight: 900;
      font-size: 0.95rem;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(234, 179, 8, 0.3);
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .btn-search:active {
      transform: scale(0.95);
      background: var(--yellow-hover);
    }

    /* Category Glass Tabs */
    .category-tabs { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
    .category-tabs::-webkit-scrollbar { display: none; }
    .tab { 
      flex: 0 0 auto; 
      padding: 10px 18px; 
      border-radius: 30px; 
      border: 1px solid var(--glass-border); 
      background: var(--glass-bg); 
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--text-muted); 
      font-size: 0.8rem; 
      font-weight: 800; 
      cursor: pointer; 
      text-transform: uppercase; 
      white-space: nowrap;
      transition: all 0.3s ease;
    }
    .tab.active { 
      background: var(--yellow); 
      color: #000; 
      border-color: var(--yellow); 
      box-shadow: 0 4px 15px rgba(234, 179, 8, 0.4);
      transform: translateY(-2px);
    }

    /* Status Subtabs */
    .status-subtabs { display: flex; gap: 6px; margin-bottom: 24px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
    .status-subtabs::-webkit-scrollbar { display: none; }
    .subtab {
      flex: 1;
      padding: 8px 12px;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.02);
      color: var(--text-muted);
      font-size: 0.7rem;
      font-weight: 800;
      text-align: center;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s ease;
    }
    .subtab.active {
      border-color: var(--yellow);
      color: var(--yellow);
      background: rgba(234, 179, 8, 0.1);
    }

    /* Search Filter Container */
    .search-filter-container {
      position: relative;
      z-index: 20;
      margin-bottom: 12px;
      padding-bottom: 4px;
    }
    .search-filter-bar {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .search-filter-bar::-webkit-scrollbar { display: none; }

    .filter-select {
      background: #141821; 
      border: 1px solid var(--glass-border); 
      color: var(--yellow); 
      padding: 8px 12px; 
      border-radius: 12px; 
      font-size: 0.75rem; 
      font-weight: 800; 
      outline: none; 
      cursor: pointer;
      transition: all 0.3s ease;
    }

    /* Grid Layout */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 14px; align-items: start; }
    .card { 
      position: relative; 
      border-radius: var(--card-radius); 
      overflow: hidden; 
      background: var(--glass-card); 
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      aspect-ratio: 2/3; 
      border: 1px solid var(--glass-border); 
      cursor: pointer; 
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease;
    }
    .card:active { transform: scale(0.95); }
    .card img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-rating { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.8); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); color: var(--yellow); padding: 2px 6px; border-radius: 6px; font-size: 0.75rem; font-weight: 800; border: 1px solid rgba(234, 179, 8, 0.3); }
    .card-status { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.8); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); padding: 3px 6px; border-radius: 6px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; }
    .status-completed { color: var(--green); border: 1px solid rgba(34, 197, 94, 0.4); }
    .status-ongoing { color: #38bdf8; border: 1px solid rgba(56, 189, 248, 0.4); }
    .status-watchlist { color: var(--yellow); border: 1px solid rgba(234, 179, 8, 0.4); }

    .empty { text-align: center; color: var(--text-muted); margin-top: 60px; font-size: 0.95rem; line-height: 1.6; }

    /* Full Screen Overlay System */
    .fullscreen-view { 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100vw; 
      height: 100vh; 
      background: rgba(7, 9, 14, 0.96); 
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      z-index: 1000; 
      display: none; 
      flex-direction: column; 
      overflow-y: auto; 
      padding: 20px 20px 40px 20px;
      will-change: transform, opacity;
      animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    @keyframes slideUp {
      from { transform: translate3d(0, 100%, 0); opacity: 0; }
      to { transform: translate3d(0, 0, 0); opacity: 1; }
    }

    .fs-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; position: relative; z-index: 30; }
    
    .back-btn { 
      background: var(--glass-bg); 
      border: 1px solid var(--glass-border); 
      color: var(--yellow); 
      width: 44px; 
      height: 44px; 
      border-radius: 14px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: transform 0.2s ease, background 0.2s ease;
      padding: 0;
    }
    .back-btn:active { transform: scale(0.9); background: rgba(234, 179, 8, 0.15); }
    .back-btn svg { width: 22px; height: 22px; stroke: var(--yellow); stroke-width: 3.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }

    /* Media Details Content */
    .detail-poster { width: 100%; max-width: 240px; aspect-ratio: 2/3; object-fit: cover; border-radius: 20px; margin: 0 auto 20px auto; border: 2px solid var(--yellow); display: block; box-shadow: 0 12px 32px rgba(0,0,0,0.8), 0 0 20px var(--glass-glow); }
    .detail-title { font-size: 1.6rem; font-weight: 900; margin-bottom: 6px; text-align: center; letter-spacing: -0.5px; }
    .detail-meta { font-size: 0.95rem; color: var(--yellow); font-weight: 800; text-align: center; margin-bottom: 14px; }
    .detail-tags { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
    .tag { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 6px 12px; border-radius: 10px; font-size: 0.75rem; color: var(--text-muted); font-weight: 700; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }

    .detail-desc { font-size: 0.9rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 24px; background: var(--glass-bg); padding: 18px; border-radius: 16px; border: 1px solid var(--glass-border); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    
    .section-title { font-size: 1.05rem; font-weight: 900; color: var(--yellow); margin: 24px 0 14px 0; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Vertically Longer Recommendations Cards */
    .recommendations-row { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 14px; margin-bottom: 20px; scrollbar-width: none; }
    .recommendations-row::-webkit-scrollbar { display: none; }
    .rec-card { flex: 0 0 140px; background: var(--glass-bg); border-radius: 16px; overflow: hidden; border: 1px solid var(--glass-border); cursor: pointer; transition: transform 0.2s ease; display: flex; flex-direction: column; }
    .rec-card:active { transform: scale(0.95); }
    .rec-card img { width: 100%; height: 220px; object-fit: cover; display: block; }
    .rec-title { font-size: 0.75rem; font-weight: 800; padding: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }

    .action-group { display: flex; flex-direction: column; gap: 10px; }
    .btn-primary { width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--yellow); color: #000; font-weight: 900; cursor: pointer; font-size: 1rem; box-shadow: 0 4px 20px rgba(234, 179, 8, 0.3); transition: transform 0.2s ease; }
    .btn-primary:active { transform: scale(0.98); }
    .status-picker { display: flex; gap: 8px; }
    .btn-status-option { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--glass-border); background: var(--glass-bg); color: var(--text-muted); font-size: 0.75rem; font-weight: 800; cursor: pointer; text-align: center; text-transform: uppercase; transition: all 0.2s ease; }
    .btn-status-option.active { border-color: var(--yellow); color: var(--yellow); background: rgba(234, 179, 8, 0.1); }
    .btn-delete { width: 100%; padding: 14px; border-radius: 14px; border: none; background: rgba(239, 68, 68, 0.85); color: #fff; font-weight: 800; cursor: pointer; margin-top: 10px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }

    /* Compact Search Results Grid */
    .search-results-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); 
      gap: 12px; 
      margin-top: 10px; 
      align-items: start; 
      position: relative; 
      z-index: 10; 
      min-height: 100px; 
    }
    .result-card { background: var(--glass-card); border-radius: var(--card-radius); overflow: hidden; border: 1px solid var(--glass-border); cursor: pointer; display: flex; flex-direction: column; position: relative; transition: transform 0.2s ease; }
    .result-card:active { transform: scale(0.95); }
    .result-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
    .result-info { padding: 6px 8px 8px 8px; }
    .result-title { font-size: 0.75rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .result-meta { font-size: 0.65rem; color: var(--text-muted); }
    .type-badge { position: absolute; top: 6px; left: 6px; background: rgba(0,0,0,0.85); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); color: var(--yellow); font-size: 0.55rem; font-weight: 800; padding: 2px 5px; border-radius: 4px; text-transform: uppercase; border: 1px solid rgba(234, 179, 8, 0.3); }

    /* Non-Overlapping Load More Section */
    .load-more-section { 
      display: flex; 
      justify-content: center; 
      align-items: center;
      margin: 30px auto 60px auto; 
      width: 100%; 
      position: relative;
      z-index: 30;
    }
    .btn-load-more { 
      background: var(--glass-bg); 
      border: 2px solid var(--yellow); 
      color: var(--yellow); 
      padding: 16px 32px; 
      border-radius: 14px; 
      font-weight: 900; 
      font-size: 0.9rem; 
      cursor: pointer; 
      width: 100%; 
      max-width: 280px; 
      backdrop-filter: blur(10px); 
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 4px 20px rgba(234, 179, 8, 0.2);
      transition: transform 0.2s ease, background 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .btn-load-more:active { transform: scale(0.95); background: rgba(234, 179, 8, 0.2); }
  </style>
</head>
<body>

  <!-- Loki Decelerating Font Shift Intro Screen -->
  <div id="splashScreen">
    <div class="loki-container">
      <span class="loki-char">W</span>
      <span class="loki-char">O</span>
      <span class="loki-char">O</span>
      <span class="loki-char">D</span>
      <span class="loki-char">Y</span>
      <span class="loki-char dot">.</span>
    </div>
  </div>

  <header>
    <div class="brand">WOODY<span>.</span></div>
    <button class="nav-search-btn" onclick="focusMainSearch()" aria-label="Search">
      <svg viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    </button>
  </header>

  <div class="search-box">
    <input type="text" id="movieInput" placeholder="Search movies, anime, cartoons..." autocomplete="off">
    <button class="btn-search" onclick="handleSearchSubmit()">Search</button>
  </div>

  <!-- Category Navigation -->
  <div class="category-tabs">
    <div class="tab active" onclick="setCategory('all', this)">All</div>
    <div class="tab" onclick="setCategory('movie', this)">Movies</div>
    <div class="tab" onclick="setCategory('series', this)">Series</div>
    <div class="tab" onclick="setCategory('anime', this)">Anime</div>
    <div class="tab" onclick="setCategory('cartoon', this)">Cartoon</div>
    <div class="tab" onclick="setCategory('documentary', this)">Documentaries</div>
  </div>

  <!-- In-Page Status Filters -->
  <div class="status-subtabs">
    <div class="subtab active" onclick="setStatusFilter('all', this)">All</div>
    <div class="subtab" onclick="setStatusFilter('watchlist', this)">Watchlist</div>
    <div class="subtab" onclick="setStatusFilter('ongoing', this)">Ongoing</div>
    <div class="subtab" onclick="setStatusFilter('completed', this)">Completed</div>
  </div>

  <div class="grid" id="movieGrid"></div>
  <div class="empty" id="emptyState">Your collection is empty.<br>Type a title above and press Search to add!</div>

  <!-- Fullscreen Search Overlay -->
  <div class="fullscreen-view" id="searchOverlay">
    <div class="fs-header">
      <button class="back-btn" onclick="closeSearchOverlay()" aria-label="Back">
        <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <div style="font-weight: 900; font-size: 1.1rem; color: var(--yellow);" id="searchTitleText">SEARCHING...</div>
      <button class="nav-search-btn" onclick="focusMainSearchFromOverlay()" aria-label="Search">
        <svg viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      </button>
    </div>

    <!-- Search Filters -->
    <div class="search-filter-container">
      <div class="search-filter-bar">
        <select class="filter-select" id="searchTypeFilter" onchange="applySearchFilters()">
          <option value="all">ALL TYPES</option>
          <option value="movie">MOVIES</option>
          <option value="series">SERIES</option>
        </select>
        <select class="filter-select" id="searchGenreFilter" onchange="applySearchFilters()">
          <option value="all">ALL GENRES</option>
          <option value="action">ACTION</option>
          <option value="animation">ANIMATION / ANIME</option>
          <option value="comedy">COMEDY</option>
          <option value="drama">DRAMA</option>
          <option value="sci-fi">SCI-FI</option>
        </select>
        <select class="filter-select" id="searchYearFilter" onchange="applySearchFilters()">
          <option value="all">ALL YEARS</option>
          <option value="2020s">2020s</option>
          <option value="2010s">2010s</option>
          <option value="2000s">2000s</option>
          <option value="1990s">1990s</option>
        </select>
      </div>
    </div>

    <div class="search-results-grid" id="searchResultsGrid"></div>

    <!-- Non-Overlapping Load More Section -->
    <div class="load-more-section" id="loadMoreSection" style="display: none;">
      <button class="btn-load-more" id="loadMoreBtn" onclick="loadMoreResults()">Load More Results</button>
    </div>
  </div>

  <!-- Universal Fullscreen Details View -->
  <div class="fullscreen-view" id="mediaDetailOverlay" style="z-index: 1100;">
    <div class="fs-header">
      <button class="back-btn" onclick="closeMediaDetailOverlay()" aria-label="Back">
        <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <div style="font-weight: 900; font-size: 1.1rem; color: var(--yellow);" id="detailHeaderTitle">DETAILS</div>
      <button class="nav-search-btn" onclick="focusMainSearchFromOverlay()" aria-label="Search">
        <svg viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      </button>
    </div>
    <img id="mPoster" class="detail-poster" src="" alt="Poster">
    <div id="mTitle" class="detail-title">Title</div>
    <div id="mMeta" class="detail-meta">★ 0.0 • Year</div>
    <div class="detail-tags">
      <span class="tag" id="mType">Type: N/A</span>
      <span class="tag" id="mGenre">Genre: N/A</span>
      <span class="tag" id="mDirector">Director: N/A</span>
    </div>

    <div id="mDesc" class="detail-desc">Description</div>
    
    <div class="action-group" id="actionGroup"></div>

    <div class="section-title">Similar Suggestions</div>
    <div class="recommendations-row" id="recommendationsRow"></div>
  </div>

  <script>
    const TMDB_API_KEY = "3fd2be6f0c70a2a598f084dd27581c3d";

    // Loki-Style Decelerating Font Shift
    const fonts = ["'Cinzel', serif", "'Space Grotesk', sans-serif", "'Playfair Display', serif", "'Outfit', sans-serif", "'Cinzel Decorative', cursive"];
    const chars = document.querySelectorAll('.loki-char');

    function startLokiAnimation() {
      chars.forEach((char, index) => {
        let speed = 70;
        let count = 0;
        const maxShifts = 15 + index * 4;

        function shiftFont() {
          const randomFont = fonts[Math.floor(Math.random() * fonts.length)];
          char.style.fontFamily = randomFont;
          count++;

          if (count < maxShifts) {
            speed += 12;
            setTimeout(shiftFont, speed);
          }
        }
        shiftFont();
      });

      setTimeout(() => {
        const splash = document.getElementById('splashScreen');
        splash.style.opacity = '0';
        setTimeout(() => splash.style.visibility = 'hidden', 600);
      }, 2200);
    }

    window.addEventListener('DOMContentLoaded', startLokiAnimation);

    let library = JSON.parse(localStorage.getItem("my_movies") || "[]");
    let currentCategory = "all";
    let currentStatusFilter = "all";
    
    let currentSearchQuery = "";
    let currentPage = 1;
    let rawSearchResults = [];
    let activeMediaDetail = null;

    function focusMainSearch() {
      const input = document.getElementById("movieInput");
      input.scrollIntoView({ behavior: 'smooth', block: 'center' });
      input.focus();
    }

    function focusMainSearchFromOverlay() {
      closeMediaDetailOverlay();
      closeSearchOverlay();
      focusMainSearch();
    }

    document.getElementById("movieInput").addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        handleSearchSubmit();
      }
    });

    function handleSearchSubmit() {
      const query = document.getElementById("movieInput").value.trim();
      if (!query) return;
      initiateSearch(query);
    }

    function render() {
      const grid = document.getElementById("movieGrid");
      const empty = document.getElementById("emptyState");

      grid.innerHTML = "";

      const filteredList = library.filter(item => {
        let categoryMatch = true;
        const itemType = (item.type || '').toLowerCase();
        const itemGenre = (item.genre || '').toLowerCase();

        if (currentCategory === "movie") categoryMatch = itemType.includes("movie");
        else if (currentCategory === "series") categoryMatch = itemType.includes("series") || itemType.includes("tv");
        else if (currentCategory === "anime") categoryMatch = itemGenre.includes("anime") || itemType.includes("anime");
        else if (currentCategory === "cartoon") categoryMatch = itemGenre.includes("animation") || itemGenre.includes("cartoon");
        else if (currentCategory === "documentary") categoryMatch = itemGenre.includes("documentary") || itemType.includes("documentary");

        let statusMatch = true;
        const status = item.status || "watchlist";
        if (currentStatusFilter !== "all") {
          statusMatch = (status === currentStatusFilter);
        }

        return categoryMatch && statusMatch;
      });

      if (filteredList.length === 0) {
        empty.style.display = "block";
        return;
      }
      empty.style.display = "none";

      filteredList.forEach((item) => {
        const actualIndex = library.findIndex(m => m.id === item.id);
        const card = document.createElement("div");
        card.className = "card";
        card.onclick = () => openHomeMediaDetail(actualIndex);
        
        const currentStatus = item.status || "watchlist";
        const statusClass = `status-${currentStatus}`;

        card.innerHTML = `
          <img src="${item.poster}" alt="${item.title}" loading="lazy">
          <div class="card-status ${statusClass}">${currentStatus}</div>
          <div class="card-rating">★ ${item.rating}</div>
        `;
        grid.appendChild(card);
      });
    }

    function setCategory(cat, el) {
      currentCategory = cat;
      document.querySelectorAll('.category-tabs .tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      render();
    }

    function setStatusFilter(status, el) {
      currentStatusFilter = status;
      document.querySelectorAll('.status-subtabs .subtab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      render();
    }

    /* Keyboard Proximity & Typo Auto-Corrector */
    function sanitizeAndSpellCheckQuery(query) {
      let q = query.trim().toLowerCase();

      const keyNeighborMap = {
        '5': 't', '1': 'i', '0': 'o', '3': 'e', '4': 'r', '7': 'u', '8': 'i', '@': 'a', '$': 's'
      };

      let normalized = "";
      for (let i = 0; i < q.length; i++) {
        const ch = q[i];
        normalized += keyNeighborMap[ch] || ch;
      }

      const dictionary = {
        "5hor": "thor",
        "thorr": "thor",
        "avengrs": "avengers",
        "avengars": "avengers",
        "spidreman": "spider-man",
        "spiderman": "spider-man",
        "batman": "the batman",
        "narutoo": "naruto",
        "jujutso": "jujutsu kaisen",
        "onepiece": "one piece",
        "oppenhemer": "oppenheimer",
        "interstelar": "interstellar",
        "incepton": "inception"
      };

      if (dictionary[normalized]) return dictionary[normalized];
      if (dictionary[q]) return dictionary[q];

      return normalized;
    }

    async function initiateSearch(rawQuery) {
      const correctedQuery = sanitizeAndSpellCheckQuery(rawQuery);
      currentSearchQuery = correctedQuery;
      currentPage = 1;
      rawSearchResults = [];

      document.getElementById("searchResultsGrid").innerHTML = "<div style='grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 40px;'>Searching database...</div>";
      document.getElementById("searchTitleText").textContent = `RESULTS FOR "${correctedQuery.toUpperCase()}"`;
      document.getElementById("searchOverlay").style.display = "flex";
      document.getElementById("loadMoreSection").style.display = "none";

      await fetchSearchResults(correctedQuery);
    }

    /* Reliable Paginated Search Logic */
    async function fetchSearchResults(query) {
      let batchResults = [];

      try {
        const tmdbRes = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&page=${currentPage}`);
        const tmdbData = await tmdbRes.json();

        if (tmdbData.results && tmdbData.results.length > 0) {
          batchResults = tmdbData.results
            .filter(item => item.poster_path)
            .map(item => ({
              imdbID: item.id.toString(),
              Title: item.title || item.name,
              Poster: `https://image.tmdb.org/t/p/w500${item.poster_path}`,
              Year: (item.release_date || item.first_air_date || "2024").substring(0, 4),
              Type: item.media_type === "tv" ? "series" : "movie"
            }));
        }
      } catch (e) {
        console.warn("TMDB engine pass failed.");
      }

      // OMDb Fallback on first page if TMDB is empty
      if (batchResults.length === 0 && currentPage === 1) {
        try {
          const omdbRes = await fetch(`https://www.omdbapi.com/?s=${encodeURIComponent(query)}&apikey=trilogy`);
          const omdbData = await omdbRes.json();

          if (omdbData && omdbData.Search && omdbData.Search.length > 0) {
            batchResults = omdbData.Search.filter(m => m.Poster && m.Poster !== "N/A" && m.Poster.startsWith("http"));
          }
        } catch (e) {
          console.error(e);
        }
      }

      if (batchResults.length > 0) {
        rawSearchResults = [...rawSearchResults, ...batchResults];
        applySearchFilters();

        // Show Load More button whenever search produces 5+ items
        document.getElementById("loadMoreSection").style.display = "flex";
      } else if (currentPage === 1) {
        document.getElementById("searchResultsGrid").innerHTML = "<div style='grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 40px;'>No matching titles found. Try adjusting your spelling.</div>";
        document.getElementById("loadMoreSection").style.display = "none";
      } else {
        // Reached end of results
        document.getElementById("loadMoreSection").style.display = "none";
      }
    }

    async function loadMoreResults() {
      currentPage++;
      const btn = document.getElementById("loadMoreBtn");
      btn.textContent = "Loading...";
      await fetchSearchResults(currentSearchQuery);
      btn.textContent = "Load More Results";
    }

    function applySearchFilters() {
      const typeFilter = document.getElementById("searchTypeFilter").value;
      const yearFilter = document.getElementById("searchYearFilter").value;

      let filtered = rawSearchResults.filter(m => {
        let typeMatch = true;
        if (typeFilter !== "all") {
          typeMatch = (m.Type || '').toLowerCase() === typeFilter;
        }

        let yearMatch = true;
        const y = parseInt(m.Year) || 0;
        if (yearFilter === "2020s") yearMatch = y >= 2020;
        else if (yearFilter === "2010s") yearMatch = y >= 2010 && y < 2020;
        else if (yearFilter === "2000s") yearMatch = y >= 2000 && y < 2010;
        else if (yearFilter === "1990s") yearMatch = y >= 1990 && y < 2000;

        return typeMatch && yearMatch;
      });

      renderSearchResults(filtered);
    }

    function renderSearchResults(results) {
      const resultsGrid = document.getElementById("searchResultsGrid");
      resultsGrid.innerHTML = "";

      if (results.length === 0) {
        resultsGrid.innerHTML = "<div style='grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 40px;'>No titles matching selected filters.</div>";
        return;
      }

      results.forEach(m => {
        const item = document.createElement("div");
        item.className = "result-card";
        item.onclick = () => openSearchMediaDetail(m.imdbID, m.Title, m.Poster, m.Year, m.Type);
        item.innerHTML = `
          <img src="${m.Poster}" alt="${m.Title}">
          <div class="type-badge">${m.Type || 'MEDIA'}</div>
          <div class="result-info">
            <div class="result-title">${m.Title}</div>
            <div class="result-meta">
              <span>${m.Year}</span>
            </div>
          </div>
        `;
        resultsGrid.appendChild(item);
      });
    }

    async function openSearchMediaDetail(id, title, poster, year, type = "movie") {
      document.getElementById("detailHeaderTitle").textContent = "PREVIEW";
      
      let rating = "7.5";
      let overview = "No description available.";
      let genre = "Entertainment";
      let director = "N/A";

      try {
        if (!isNaN(id)) {
          const tmdbRes = await fetch(`https://api.themoviedb.org/3/${type.toLowerCase() === "series" || type.toLowerCase() === "tv" ? "tv" : "movie"}/${id}?api_key=${TMDB_API_KEY}`);
          const tmdbDetails = await tmdbRes.json();

          if (tmdbDetails && tmdbDetails.overview) {
            rating = tmdbDetails.vote_average ? tmdbDetails.vote_average.toFixed(1) : "7.5";
            overview = tmdbDetails.overview;
            genre = tmdbDetails.genres && tmdbDetails.genres.length > 0 ? tmdbDetails.genres[0].name : "Entertainment";
          }
        } else {
          const omdbRes = await fetch(`https://www.omdbapi.com/?i=${id}&apikey=trilogy`);
          const omdbDetails = await omdbRes.json();
          if (omdbDetails && omdbDetails.Response !== "False") {
            rating = (omdbDetails.imdbRating && omdbDetails.imdbRating !== "N/A") ? omdbDetails.imdbRating : "7.5";
            overview = omdbDetails.Plot || overview;
            genre = omdbDetails.Genre !== "N/A" ? omdbDetails.Genre.split(",")[0] : "Entertainment";
            director = omdbDetails.Director || director;
          }
        }
      } catch (e) {}

      activeMediaDetail = { id, title, poster, year, type: type.toUpperCase(), rating, overview, genre, director, status: "watchlist" };

      displayDetailOverlay();

      const actionGroup = document.getElementById("actionGroup");
      const isAlreadySaved = library.some(item => item.id === id);

      if (isAlreadySaved) {
        actionGroup.innerHTML = `<button class="btn-primary" style="background: var(--glass-bg); color: var(--yellow); border: 1px solid var(--yellow);" disabled>✓ Already In Library</button>`;
      } else {
        actionGroup.innerHTML = `<button class="btn-primary" onclick="addCurrentToLibrary()">+ Add to My Library</button>`;
      }

      fetchRecommendations(genre, title, id, type);
    }

    function openHomeMediaDetail(index) {
      document.getElementById("detailHeaderTitle").textContent = "MY TITLE";
      
      const item = library[index];
      activeMediaDetail = { ...item };

      displayDetailOverlay();
      renderHomeActionGroup(index);
      fetchRecommendations(item.genre || "Movie", item.title, item.id, item.type);
    }

    function displayDetailOverlay() {
      const item = activeMediaDetail;
      document.getElementById("mPoster").src = item.poster;
      document.getElementById("mTitle").textContent = item.title;
      document.getElementById("mMeta").textContent = `★ ${item.rating} / 10  •  ${item.year}`;
      document.getElementById("mType").textContent = `Type: ${item.type || 'MEDIA'}`;
      document.getElementById("mGenre").textContent = `Genre: ${item.genre || 'N/A'}`;
      document.getElementById("mDirector").textContent = `Director: ${item.director || 'N/A'}`;
      document.getElementById("mDesc").textContent = item.overview;

      document.getElementById("mediaDetailOverlay").style.display = "flex";
    }

    function renderHomeActionGroup(index) {
      const actionGroup = document.getElementById("actionGroup");
      const currentStatus = library[index].status || "watchlist";

      actionGroup.innerHTML = `
        <div style="font-size: 0.8rem; font-weight: 800; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase;">Update Status:</div>
        <div class="status-picker">
          <div class="btn-status-option ${currentStatus === 'watchlist' ? 'active' : ''}" onclick="updateStatus(${index}, 'watchlist')">Watchlist</div>
          <div class="btn-status-option ${currentStatus === 'ongoing' ? 'active' : ''}" onclick="updateStatus(${index}, 'ongoing')">Ongoing</div>
          <div class="btn-status-option ${currentStatus === 'completed' ? 'active' : ''}" onclick="updateStatus(${index}, 'completed')">Completed</div>
        </div>
        <button class="btn-delete" onclick="removeFromLibrary(${index})">Remove from Library</button>
      `;
    }

    function updateStatus(index, newStatus) {
      library[index].status = newStatus;
      localStorage.setItem("my_movies", JSON.stringify(library));
      renderHomeActionGroup(index);
      render();
    }

    function removeFromLibrary(index) {
      library.splice(index, 1);
      localStorage.setItem("my_movies", JSON.stringify(library));
      render();
      closeMediaDetailOverlay();
    }

    function addCurrentToLibrary() {
      if (activeMediaDetail && !library.some(item => item.id === activeMediaDetail.id)) {
        library.unshift(activeMediaDetail);
        localStorage.setItem("my_movies", JSON.stringify(library));
        render();
      }
      closeMediaDetailOverlay();
      closeSearchOverlay();
      document.getElementById("movieInput").value = "";
    }

    /* GUARANTEED RECOMMENDATIONS ENGINE */
    async function fetchRecommendations(genre, currentTitle, id, type) {
      const recRow = document.getElementById("recommendationsRow");
      recRow.innerHTML = "<div style='color: var(--text-muted); font-size: 0.8rem;'>Loading suggestions...</div>";

      let results = [];

      // Pass 1: Try TMDB ID recommendations if ID is numeric
      if (id && !isNaN(id)) {
        try {
          const mediaType = (type && type.toLowerCase().includes("series")) ? "tv" : "movie";
          const simRes = await fetch(`https://api.themoviedb.org/3/${mediaType}/${id}/recommendations?api_key=${TMDB_API_KEY}`);
          const simData = await simRes.json();
          if (simData && simData.results && simData.results.length > 0) {
            results = simData.results;
          }
        } catch (e) {}
      }

      // Pass 2: Search using clean keyword or genre title
      if (results.length === 0) {
        try {
          const queryTerm = (genre && genre !== "Entertainment" && genre !== "N/A") ? genre.split(",")[0].trim() : currentTitle.split(/[:\-\s]/)[0];
          const searchRes = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(queryTerm)}`);
          const searchData = await searchRes.json();
          if (searchData && searchData.results && searchData.results.length > 0) {
            results = searchData.results;
          }
        } catch (e) {}
      }

      // Pass 3: Ultimate Fallback (General Popular Discovery)
      if (results.length === 0) {
        try {
          const popRes = await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${TMDB_API_KEY}`);
          const popData = await popRes.json();
          if (popData && popData.results) {
            results = popData.results;
          }
        } catch (e) {}
      }

      let candidates = results.filter(m => {
        const mTitle = m.title || m.name || "";
        return mTitle.toLowerCase() !== currentTitle.toLowerCase() && m.poster_path;
      });

      if (candidates.length > 0) {
        recRow.innerHTML = "";
        
        // Random Shuffle
        for (let i = candidates.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
        }

        candidates.slice(0, 8).forEach(m => {
          const recCard = document.createElement("div");
          recCard.className = "rec-card";
          const titleStr = m.title || m.name;
          const posterUrl = `https://image.tmdb.org/t/p/w500${m.poster_path}`;
          const yearStr = (m.release_date || m.first_air_date || "2024").substring(0, 4);
          const mType = m.media_type || (m.first_air_date ? "series" : "movie");

          recCard.onclick = () => openSearchMediaDetail(m.id.toString(), titleStr, posterUrl, yearStr, mType);
          recCard.innerHTML = `
            <img src="${posterUrl}" alt="${titleStr}">
            <div class="rec-title">${titleStr}</div>
          `;
          recRow.appendChild(recCard);
        });
      } else {
        recRow.innerHTML = "<div style='color: var(--text-muted); font-size: 0.8rem;'>No suggestions found.</div>";
      }
    }

    function closeSearchOverlay() {
      document.getElementById("searchOverlay").style.display = "none";
    }

    function closeMediaDetailOverlay() {
      document.getElementById("mediaDetailOverlay").style.display = "none";
      activeMediaDetail = null;
    }

    render();
  </script>
